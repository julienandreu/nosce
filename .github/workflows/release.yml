name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: "Tag to release"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine archive name
        id: archive
        shell: bash
        run: |
          NAME="nosce-${{ inputs.tag }}-${{ matrix.target }}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Package binary
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/nosce"
          ARCHIVE="${{ steps.archive.outputs.name }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname "$BINARY")" nosce
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: |
            ${{ steps.archive.outputs.name }}.tar.gz
            ${{ steps.archive.outputs.name }}.tar.gz.sha256

  upload:
    name: Upload release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec mv {} release/ \;

      - name: Create checksums file
        working-directory: release
        run: cat *.sha256 > checksums.txt

      - name: Generate latest.json manifest
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          COMMIT="${{ github.sha }}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          FILES="{}"
          for f in release/*.tar.gz; do
            BASENAME="$(basename "$f")"
            SHA256="$(sha256sum "$f" | awk '{print $1}')"
            SIZE="$(stat --printf='%s' "$f" 2>/dev/null || stat -f '%z' "$f")"
            TARGET="$(echo "$BASENAME" | sed "s/nosce-${TAG}-//" | sed 's/\.tar\.gz//')"
            FILES=$(echo "$FILES" | jq --arg t "$TARGET" --arg n "$BASENAME" --arg s "$SHA256" --argjson sz "$SIZE" \
              '. + {($t): {name: $n, sha256: $s, size: $sz}}')
          done

          jq -n --arg v "$VERSION" --arg c "$COMMIT" --arg d "$DATE" --argjson f "$FILES" \
            '{version: $v, commit: $c, date: $d, files: $f}' > release/latest.json

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ inputs.tag }}" >/dev/null 2>&1 || \
            gh release create "${{ inputs.tag }}" --title "${{ inputs.tag }}" --generate-notes

          gh release upload "${{ inputs.tag }}" \
            release/*.tar.gz \
            release/*.sha256 \
            release/checksums.txt \
            release/latest.json \
            --clobber
