name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine archive name
        id: archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          case "${{ matrix.target }}" in
            x86_64-apple-darwin)          ARCH="x86_64";  PLATFORM="darwin" ;;
            aarch64-apple-darwin)         ARCH="aarch64"; PLATFORM="darwin" ;;
            x86_64-unknown-linux-musl)    ARCH="x86_64";  PLATFORM="linux" ;;
            aarch64-unknown-linux-gnu)    ARCH="aarch64"; PLATFORM="linux" ;;
          esac
          NAME="nosce-${VERSION}-${ARCH}-${PLATFORM}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Package binary
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/nosce"
          ARCHIVE="${{ steps.archive.outputs.name }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname "$BINARY")" nosce
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: |
            ${{ steps.archive.outputs.name }}.tar.gz
            ${{ steps.archive.outputs.name }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec mv {} release/ \;

      - name: Create checksums file
        working-directory: release
        run: cat *.sha256 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.sha256
            release/checksums.txt
