version: 1

# Defaults (overridable via skill arguments)
# input: path to a git repository containing submodules
# output: path where reports and docs are written
input: ~/.nosce/input
output: ~/.nosce/output

# GitHub owner for gh CLI (PR lookups)
github_owner: nosce

# Report settings
reports:
  timezone: Canada/Montreal

# Docs settings
docs:
  categories:
    - overview
    - architecture
    - apis
    - databases
    - dependencies

# User profiles — each profile sees a tailored report summary
profiles:
  - id: engineer
    label: Engineer
    icon: wrench
    description: "Technical implementation: code changes, diffs, breaking changes, architecture, testing, deployment risks"
    focus:
      - commit_details
      - code_diffs
      - breaking_changes
      - tech_debt
      - architectural_impact
      - test_coverage_impact
      - regression_potential
      - deployment_safety

  - id: product
    label: Product
    icon: lightbulb
    description: "Delivery orchestration: feature progress, dependencies, velocity, risk assessment, roadmap alignment"
    focus:
      - feature_progress
      - delivery_status
      - blockers
      - cross_team_dependencies
      - risk_assessment
      - sprint_health
      - roadmap_alignment
      - feature_completeness

  - id: sales
    label: Sales
    icon: megaphone
    description: "Customer-facing changes: new features, bug fixes, competitive advantages, answers for sales leads"
    focus:
      - new_features
      - customer_benefits
      - competitive_advantages
      - release_highlights
      - user_facing_bugs
      - ux_improvements
      - demo_worthy_changes
